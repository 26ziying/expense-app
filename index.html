<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>小帳本</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kaisei+Opti:wght@400;500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --sage:#9aaa94;--sage-d:#7d9477;--sage-l:#ccd5c9;--sage-p:#edf0ec;
  --blush:#c4a090;--blush-l:#e2ccc4;--blush-p:#f6eeeb;
  --slate:#8fa3ae;--slate-p:#e8eff2;
  --income:#7fa896;--income-p:#e4f0ed;--income-d:#4a7a6a;
  --ink:#3e3a36;--ink-m:#7a736c;--ink-s:#a8a09a;
  --bg:#f2ede8;--surface:#faf7f4;--white:#fff;
  --r:16px;--rs:12px;--nav-h:72px;
  --ft:'Kaisei Opti', serif;
  --fb:'Noto Sans TC',sans-serif;
}
html,body{height:100%;background:var(--bg)}
body{font-family:var(--fb);background:var(--bg);color:var(--ink);height:100%;max-width:480px;margin:0 auto;position:relative;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}
.screen{display:none;flex-direction:column;flex:1;min-height:0}
.screen.active{display:flex}
.scroll{flex:1;overflow-y:auto;padding:14px 16px 24px;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{display:none}

/* 頂部月份選單：置中且無標題 */
.topbar{background:var(--surface);padding:calc(env(safe-area-inset-top,0px)+12px) 16px 12px;flex-shrink:0;border-bottom:1px solid rgba(0,0,0,.06)}
.tb-row{display:flex;align-items:center;justify-content:center;position:relative}

.bottom-nav{background:var(--white);border-top:1px solid rgba(0,0,0,.07);display:flex;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0px);height:var(--nav-h);z-index:10}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;border:none;background:transparent;padding:8px 0}
.nav-tab-icon{font-size:20px;line-height:1;transition:transform .15s}
.nav-tab-label{font-size:9px;color:var(--ink-s);letter-spacing:.5px;font-family:var(--ft)}
.nav-tab.active .nav-tab-label{color:var(--sage-d);font-weight:500}
.nav-tab.active .nav-tab-icon{transform:scale(1.1)}
.nav-center{flex:1;display:flex;align-items:center;justify-content:center}
.fab{width:56px;height:56px;border-radius:18px;background:var(--sage);color:#fff;border:none;font-size:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px rgba(154,170,148,.55);margin-bottom:4px;transition:transform .15s}
.fab:active{transform:scale(.93)}

.month-nav{display:flex;align-items:center;gap:15px}
.mnav-btn{width:36px;height:36px;border-radius:12px;border:none;background:var(--white);font-size:18px;cursor:pointer;color:var(--sage-d);box-shadow:0 2px 8px rgba(0,0,0,.05)}
.mnav-lbl{font-family:var(--ft);font-size:18px;color:var(--ink);letter-spacing:1px;min-width:100px;text-align:center;font-weight:700}

.hero{background:linear-gradient(135deg,#c8d3c5,#b5c8bf,#a5b8c8);border-radius:20px;padding:22px 20px 18px;margin-bottom:12px;position:relative;overflow:hidden}
.hero-amount{font-family:var(--ft);font-size:36px;color:#fff;line-height:1}
.card{background:var(--white);border-radius:var(--r);padding:16px;margin-bottom:12px;border:1px solid rgba(0,0,0,.04)}
.card-title{font-family:var(--ft);font-size:14px;color:var(--ink-m);margin-bottom:12px;display:flex;justify-content:space-between}
.rec-item{display:flex;align-items:center;gap:11px;padding:12px 0;border-bottom:1px solid rgba(0,0,0,.05);cursor:pointer}
.rec-info{flex:1;min-width:0}
.rec-right{text-align:right}

.calc-input-wrap{position:relative}
.calc-trigger{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--sage-l);color:var(--sage-d);border-radius:6px;padding:2px 6px;font-size:10px;font-weight:700;pointer-events:none}

#calc-panel{position:fixed;bottom:0;left:0;right:0;background:#fff;z-index:1000;display:none;padding:15px;box-shadow:0 -5px 20px rgba(0,0,0,0.1);max-width:480px;margin:0 auto;border-radius:20px 20px 0 0}
.calc-display{background:var(--bg);padding:15px;text-align:right;font-size:24px;font-family:var(--ft);margin-bottom:10px;border-radius:10px;min-height:60px;overflow:hidden;text-overflow:ellipsis}
.calc-grid{display:grid;grid-template-columns:repeat(4, 1fr);gap:8px}
.calc-btn{padding:15px;text-align:center;background:var(--surface);border-radius:10px;font-size:18px;font-family:var(--ft);cursor:pointer;border:1px solid rgba(0,0,0,0.05)}
.calc-btn.op{background:var(--sage-p);color:var(--sage-d)}
.calc-btn.eq{background:var(--sage);color:#fff;grid-column: span 2}

.sheet-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(62,58,54,.45);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s;display:flex;align-items:flex-end;max-width:480px;margin:0 auto}
.sheet-overlay.open{opacity:1;pointer-events:all}
.sheet{width:100%;background:var(--white);border-radius:28px 28px 0 0;padding-bottom:calc(env(safe-area-inset-bottom,0px)+16px);transform:translateY(100%);transition:transform .32s cubic-bezier(.32,.72,0,1);max-height:92dvh;display:flex;flex-direction:column}
.sheet-overlay.open .sheet{transform:translateY(0)}
.sheet-handle{width:40px;height:4px;background:rgba(0,0,0,.12);border-radius:2px;margin:14px auto 8px}
.sheet-title{font-family:var(--ft);font-size:19px;color:var(--ink);padding:8px 20px 8px;text-align:center}
.sheet-scroll{overflow-y:auto;padding:10px 20px;flex:1}
.f-group{margin-bottom:16px}
.f-label{font-size:10px;color:var(--ink-s);letter-spacing:1.5px;margin-bottom:6px;display:block;font-family:var(--ft)}
.f-input, .f-select{width:100%;padding:13px 14px;border:1px solid rgba(0,0,0,.1);border-radius:var(--rs);font-size:15px;background:var(--surface);outline:none;appearance:none;font-family:var(--fb)}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.type-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.type-btn{padding:11px;border-radius:var(--rs);font-family:var(--ft);font-size:14px;cursor:pointer;border:1.5px solid rgba(0,0,0,.1);background:var(--bg);color:var(--ink-m);text-align:center}
.type-btn.active-exp{background:var(--blush-p);border-color:var(--blush);color:var(--blush)}
.type-btn.active-inc{background:var(--income-p);border-color:var(--income);color:var(--income-d)}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.cat-pick{padding:10px 4px;text-align:center;border-radius:10px;font-size:11px;cursor:pointer;border:1.5px solid transparent;display:flex;flex-direction:column;align-items:center;gap:4px;font-family:var(--ft)}
.cat-pick.on{border-color:var(--sage);background:var(--sage-p)}
.f-actions{display:flex;gap:10px;padding:12px 20px;flex-shrink:0}
.f-save{flex:2;padding:14px;background:var(--sage);border:none;border-radius:var(--rs);font-family:var(--ft);color:#fff;cursor:pointer}
.f-cancel{flex:1;padding:14px;background:var(--bg);border:none;border-radius:var(--rs);font-family:var(--ft);color:var(--ink-m);cursor:pointer}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(62,58,54,.92);color:#fff;padding:10px 20px;border-radius:22px;font-size:12px;opacity:0;transition:all .25s;z-index:300}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">
  <div class="screen active" id="sc-home">
    <div class="topbar"><div class="tb-row"><div class="month-nav"><button class="mnav-btn" onclick="chMonth(-1)">‹</button><div class="mnav-lbl" id="home-month"></div><button class="mnav-btn" onclick="chMonth(1)">›</button></div></div></div>
    <div class="scroll" id="home-scroll"></div>
  </div>
  
  <div class="screen" id="sc-records">
    <div class="topbar"><div class="tb-row"><div class="month-nav"><button class="mnav-btn" onclick="chMonth(-1)">‹</button><div class="mnav-lbl" id="rec-month"></div><button class="mnav-btn" onclick="chMonth(1)">›</button></div></div></div>
    <div class="scroll" id="rec-scroll"></div>
  </div>

  <div class="screen" id="sc-charts">
    <div class="topbar"><div class="tb-row"><div class="month-nav"><button class="mnav-btn" onclick="chMonth(-1)">‹</button><div class="mnav-lbl" id="chart-month"></div><button class="mnav-btn" onclick="chMonth(1)">›</button></div></div></div>
    <div class="scroll" id="chart-scroll">
        <div class="card"><div class="card-title">支出趨勢</div><canvas id="trendChart"></canvas></div>
        <div class="card"><div class="card-title">分類佔比</div><canvas id="pieChart"></canvas></div>
    </div>
  </div>

  <div class="screen" id="sc-budget">
    <div class="topbar"><div class="tb-row"><div class="month-nav"><button class="mnav-btn" onclick="chMonth(-1)">‹</button><div class="mnav-lbl" id="bud-month"></div><button class="mnav-btn" onclick="chMonth(1)">›</button></div></div></div>
    <div class="scroll">
        <div class="card"><div class="card-title">預算執行中</div><div style="font-size:24px; color:var(--sage-d)">功能開發中...</div></div>
    </div>
  </div>

  <div class="bottom-nav">
    <button class="nav-tab active" id="nav-home" onclick="goScreen('home')"><div class="nav-tab-icon">⌂</div><div class="nav-tab-label">總覽</div></button>
    <button class="nav-tab" id="nav-records" onclick="goScreen('records')"><div class="nav-tab-icon">☰</div><div class="nav-tab-label">明細</div></button>
    <div class="nav-center"><button class="fab" onclick="openAdd()">＋</button></div>
    <button class="nav-tab" id="nav-charts" onclick="goScreen('charts')"><div class="nav-tab-icon">◎</div><div class="nav-tab-label">圖表</div></button>
    <button class="nav-tab" id="nav-budget" onclick="goScreen('budget')"><div class="nav-tab-icon">◇</div><div class="nav-tab-label">預算</div></button>
  </div>
</div>

<div class="sheet-overlay" id="add-overlay" onclick="overlayTap(event,'add-overlay')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">新增記錄</div>
    <div class="sheet-scroll">
      <div class="type-toggle">
        <button id="btn-exp" class="type-btn active-exp" onclick="setType('expense')">－ 支出</button>
        <button id="btn-inc" class="type-btn" onclick="setType('income')">＋ 收入</button>
      </div>

      <div class="f-row">
        <div class="f-group">
            <label class="f-label">金額 *</label>
            <div class="calc-input-wrap" onclick="openCalc('f-amount')">
                <input class="f-input" id="f-amount" type="text" placeholder="0" readonly>
                <div class="calc-trigger">CALC</div>
            </div>
        </div>
        <div class="f-group">
            <label class="f-label">點數 (回饋)</label>
            <div class="calc-input-wrap" onclick="openCalc('f-points')">
                <input class="f-input" id="f-points" type="text" placeholder="0" readonly>
                <div class="calc-trigger">CALC</div>
            </div>
        </div>
      </div>

      <div class="f-row">
        <div class="f-group">
            <label class="f-label">付款方式</label>
            <select class="f-select" id="f-payment">
                <option value="現金">現金</option>
                <option value="信用卡">信用卡</option>
                <option value="LINE Pay">LINE Pay</option>
                <option value="街口支付">街口支付</option>
                <option value="Apple Pay">Apple Pay</option>
                <option value="其他">其他</option>
            </select>
        </div>
        <div class="f-group">
            <label class="f-label">銀行 / 來源</label>
            <select class="f-select" id="f-source">
                <option value="現金">現金</option>
                <option value="中國信託">中國信託</option>
                <option value="國泰世華">國泰世華</option>
                <option value="台新銀行">台新銀行</option>
                <option value="富邦銀行">富邦銀行</option>
                <option value="其他">其他</option>
            </select>
        </div>
      </div>

      <div class="f-group"><label class="f-label">店家 / 說明</label><input class="f-input" id="f-store" type="text" placeholder="例：全家、薪資"></div>
      <div class="f-group"><label class="f-label">分類</label><div class="cat-grid" id="cat-grid"></div></div>
      <div class="f-group"><label class="f-label">日期</label><input class="f-input" id="f-date" type="date"></div>
      <div class="f-group"><label class="f-label">備註</label><input class="f-input" id="f-note" type="text" placeholder="備註..."></div>
    </div>
    <div class="f-actions"><button class="f-cancel" onclick="closeAdd()">取消</button><button class="f-save" id="save-btn" onclick="saveExpense()">記帳</button></div>
  </div>
</div>

<div id="calc-panel">
    <div class="calc-display" id="calc-display">0</div>
    <div class="calc-grid">
        <div class="calc-btn" onclick="calcInput('7')">7</div><div class="calc-btn" onclick="calcInput('8')">8</div><div class="calc-btn" onclick="calcInput('9')">9</div><div class="calc-btn op" onclick="calcInput('/')">÷</div>
        <div class="calc-btn" onclick="calcInput('4')">4</div><div class="calc-btn" onclick="calcInput('5')">5</div><div class="calc-btn" onclick="calcInput('6')">6</div><div class="calc-btn op" onclick="calcInput('*')">×</div>
        <div class="calc-btn" onclick="calcInput('1')">1</div><div class="calc-btn" onclick="calcInput('2')">2</div><div class="calc-btn" onclick="calcInput('3')">3</div><div class="calc-btn op" onclick="calcInput('-')">-</div>
        <div class="calc-btn" onclick="calcInput('0')">0</div><div class="calc-btn" onclick="calcInput('.')">.</div><div class="calc-btn op" onclick="calcClear()">C</div><div class="calc-btn op" onclick="calcInput('+')">+</div>
        <div class="calc-btn eq" onclick="calcComplete()">完成</div><div class="calc-btn op" onclick="closeCalc()">關閉</div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SB='https://utlbkzikhqtgynsjyylu.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV0bGJremlraHF0Z3luc2p5eWx1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMjQ3NzUsImV4cCI6MjA5MDgwMDc3NX0.oLKJ5bMYdtVoOIRo5qzi0JJVaD-Tte4Hdb5ZojR895c';
const H={apikey:KEY,Authorization:`Bearer ${KEY}`,'Content-Type':'application/json'};

const EXP_CATS={'交通':{e:'🚇',c:'#8fa3ae'},'飲食':{e:'🍜',c:'#c4a090'},'貓貓':{e:'🐱',c:'#9aaa94'},'運動':{e:'🏋',c:'#7fa896'},'房租':{e:'🏠',c:'#3e3a36'},'醫療':{e:'💊',c:'#e2ccc4'},'購物':{e:'🛍',c:'#ccd5c9'},'娛樂':{e:'✨',c:'#edf0ec'},'必需品':{e:'🧴',c:'#f6eeeb'},'學習':{e:'📚',c:'#b5c8bf'},'其他':{e:'⭐',c:'#d1d1d1'}};
const INC_CATS={'薪水':{e:'💵'},'兼職':{e:'💼'},'補助':{e:'🎫'},'家裡贊':{e:'🎁'},'其他收入':{e:'⭐'}};

let exps=[], cy=new Date().getFullYear(), cm=new Date().getMonth()+1;
let curScr='home', selCat='飲食', selType='expense', calcTargetId = '';
let charts = {};

function mlbl(){return`${cy}/${String(cm).padStart(2,'0')}`}
function updMonths(){['home','rec','chart','bud'].forEach(k=>{const el=document.getElementById(k+'-month');if(el)el.textContent=mlbl()})}
function chMonth(d){cm+=d;if(cm>12){cm=1;cy++}if(cm<1){cm=12;cy--}updMonths();loadData()}

function goScreen(s){
  curScr=s;
  document.querySelectorAll('.screen').forEach(el=>el.classList.remove('active'));
  document.getElementById('sc-'+s).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('nav-'+s).classList.add('active');
  render(s);
}

// 計算機
function openCalc(id) { calcTargetId=id; document.getElementById('calc-display').textContent=document.getElementById(id).value||'0'; document.getElementById('calc-panel').style.display='block'; }
function closeCalc() { document.getElementById('calc-panel').style.display='none'; }
function calcInput(v) { let d=document.getElementById('calc-display'); d.textContent=(d.textContent==='0' && !isNaN(v))?v:d.textContent+v; }
function calcClear() { document.getElementById('calc-display').textContent='0'; }
function calcComplete() {
    try {
        let val = document.getElementById('calc-display').textContent.replace(/×/g,'*').replace(/÷/g,'/');
        let res=eval(val);
        if(!isFinite(res)) throw new Error();
        document.getElementById(calcTargetId).value=Math.round(res*100)/100; 
        closeCalc();
    } catch(e) { alert("計算錯誤"); calcClear(); }
}

async function loadData(){
  const start=`${cy}-${String(cm).padStart(2,'0')}-01`, end=cm===12?`${cy+1}-01-01`:`${cy}-${String(cm+1).padStart(2,'0')}-01`;
  try{
    const r=await fetch(`${SB}/rest/v1/expenses?select=*&created_at=gte.${start}&created_at=lt.${end}&order=created_at.desc`,{headers:H});
    exps=await r.json();
  }catch(e){ exps=[]; showToast('連線失敗'); }
  render(curScr);
}

function render(s){
  if(s==='home') renderHome();
  else if(s==='records') renderRecords();
  else if(s==='charts') renderCharts();
}

function renderHome(){
  const net = exps.reduce((s,e)=>s+(e.type==='income'?e.amount:-e.amount),0);
  const expTotal = exps.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);
  
  // 分類摘要窗格
  const catSums = {};
  exps.filter(e=>e.type==='expense').forEach(e=>{ catSums[e.category] = (catSums[e.category]||0) + e.amount; });
  const topCat = Object.entries(catSums).sort((a,b)=>b[1]-a[1])[0] || ["無", 0];

  const items=exps.slice(0,5).map(e=>`
    <div class="rec-item">
        <div class="rec-info"><div style="font-weight:500">${e.store||'—'}</div><div style="font-size:11px;color:#999">${e.category} · ${e.payment_method||''}</div></div>
        <div class="rec-right"><div style="color:${e.type==='income'?'#7fa896':'#c4a090'}">${e.type==='income'?'+':'-'}NT$${e.amount}</div><div style="font-size:9px;color:#999">${e.source||''}</div></div>
    </div>`).join('')||'<div style="text-align:center;padding:20px;color:#999;font-size:14px">尚無記錄</div>';

  document.getElementById('home-scroll').innerHTML=`
    <div class="hero"><div style="font-size:11px;color:rgba(255,255,255,0.8);margin-bottom:5px">本月結餘</div><div class="hero-amount">NT$ ${net.toLocaleString()}</div></div>
    <div class="card"><div class="card-title"><span>本月消費摘要</span><span style="color:var(--blush)">-NT$ ${expTotal.toLocaleString()}</span></div>
        <div style="font-size:13px; color:var(--ink-m)">最大支出分類：<b style="color:var(--ink)">${topCat[0]}</b> (NT$ ${topCat[1].toLocaleString()})</div>
    </div>
    <div class="card"><div class="card-title">近期交易</div>${items}</div>`;
}

function renderRecords(){
    document.getElementById('rec-scroll').innerHTML=`<div class="card">${exps.map(e=>`
    <div class="rec-item">
        <div class="rec-info"><div>${e.store||'—'}</div><div style="font-size:11px;color:#999">${e.created_at.slice(0,10)} · ${e.category}</div></div>
        <div class="rec-right"><div style="color:${e.type==='income'?'#7fa896':'#c4a090'}">${e.type==='income'?'+':'-'}NT$${e.amount}</div><div style="font-size:9px;color:#999">${e.payment_method||''} · ${e.source||''}</div></div>
    </div>`).join('')||'<div style="text-align:center;padding:20px;color:#999;font-size:14px">尚無記錄</div>'}</div>`;
}

// 圖表邏輯
function renderCharts(){
    const ctxTrend = document.getElementById('trendChart').getContext('2d');
    const ctxPie = document.getElementById('pieChart').getContext('2d');
    
    // 每日趨勢
    const days = Array.from({length: new Date(cy, cm, 0).getDate()}, (_, i) => i + 1);
    const dailyData = days.map(d => {
        const dayStr = `${cy}-${String(cm).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        return exps.filter(e => e.type==='expense' && e.created_at.startsWith(dayStr)).reduce((s,e)=>s+e.amount,0);
    });

    if(charts.trend) charts.trend.destroy();
    charts.trend = new Chart(ctxTrend, {
        type: 'line',
        data: { labels: days, datasets: [{ label: '支出', data: dailyData, borderColor: '#c4a090', tension: 0.3, fill: true, backgroundColor: 'rgba(196,160,144,0.1)' }] },
        options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
    });

    // 分類佔比
    const catSums = {};
    exps.filter(e=>e.type==='expense').forEach(e=>{ catSums[e.category] = (catSums[e.category]||0) + e.amount; });
    
    if(charts.pie) charts.pie.destroy();
    charts.pie = new Chart(ctxPie, {
        type: 'doughnut',
        data: {
            labels: Object.keys(catSums),
            datasets: [{ data: Object.values(catSums), backgroundColor: Object.keys(catSums).map(k=>(EXP_CATS[k]||{c:'#ddd'}).c) }]
        },
        options: { plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } } } }
    });
}

function setType(t){
  selType=t;
  document.getElementById('btn-exp').className=t==='expense'?'type-btn active-exp':'type-btn';
  document.getElementById('btn-inc').className=t==='income'?'type-btn active-inc':'type-btn';
  selCat=t==='expense'?'飲食':'薪水'; renderCatGrid();
}

function renderCatGrid(){
  const cats=selType==='expense'?EXP_CATS:INC_CATS;
  document.getElementById('cat-grid').innerHTML=Object.entries(cats).map(([n,v])=>`<div class="cat-pick ${selCat===n?'on':''}" onclick="selCat='${n}';renderCatGrid()"><div style="font-size:20px">${v.e}</div><div>${n}</div></div>`).join('');
}

async function saveExpense(){
  const amt=parseFloat(document.getElementById('f-amount').value);
  if(!amt || isNaN(amt)) return showToast('請輸入金額');
  
  const data={
    amount:amt, category:selCat, type:selType, 
    store:document.getElementById('f-store').value,
    points:parseFloat(document.getElementById('f-points').value)||0,
    payment_method:document.getElementById('f-payment').value,
    source:document.getElementById('f-source').value,
    created_at:document.getElementById('f-date').value, 
    note:document.getElementById('f-note').value
  };

  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = '處理中...';

  try{
    const res = await fetch(`${SB}/rest/v1/expenses`,{method:'POST',headers:H,body:JSON.stringify(data)});
    if(!res.ok) throw new Error();
    closeAdd(); await loadData(); showToast('記帳成功');
    ['f-amount','f-points','f-store','f-note'].forEach(id=>document.getElementById(id).value='');
  }catch(e){ showToast('寫入失敗'); }finally{ btn.disabled = false; btn.textContent = '記帳'; }
}

function openAdd(){ document.getElementById('f-date').valueAsDate=new Date(); setType('expense'); document.getElementById('add-overlay').classList.add('open'); }
function closeAdd(){ document.getElementById('add-overlay').classList.remove('open'); }
function overlayTap(e,id){ if(e.target.id===id) closeAdd(); }
function showToast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }

updMonths(); loadData();
</script>
</body>
</html>
