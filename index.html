<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>小帳本</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --sage:#9aaa94;--sage-d:#7d9477;--sage-l:#ccd5c9;--sage-p:#edf0ec;
  --blush:#c4a090;--blush-l:#e2ccc4;--blush-p:#f6eeeb;
  --income:#7fa896;--income-p:#e4f0ed;--income-d:#3a7060;
  --ink:#3e3a36;--ink-m:#7a736c;--ink-s:#a8a09a;
  --bg:#f2ede8;--surface:#faf7f4;--white:#fff;
  --r:16px;--rs:12px;--nav-h:68px;
  --ft:'Zen Maru Gothic',sans-serif;
  --fb:'Noto Sans TC',sans-serif;
}
html,body{height:100%;background:var(--bg)}
body{font-family:var(--fb);background:var(--bg);color:var(--ink);height:100%;max-width:480px;margin:0 auto;position:relative;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}
.screen{display:none;flex-direction:column;flex:1;min-height:0}
.screen.active{display:flex}
.scroll{flex:1;overflow-y:auto;padding:14px 16px 24px;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{display:none}

/* Topbar */
.topbar{background:var(--surface);padding:calc(env(safe-area-inset-top,0px)+10px) 16px 10px;flex-shrink:0;border-bottom:1px solid rgba(0,0,0,.06);display:flex;align-items:center;justify-content:center}
.month-nav{display:flex;align-items:center;gap:14px}
.mnav-btn{width:32px;height:32px;border-radius:10px;border:1px solid rgba(0,0,0,.1);background:var(--bg);font-size:18px;cursor:pointer;color:var(--ink-m);display:flex;align-items:center;justify-content:center}
.mnav-lbl{font-family:var(--ft);font-size:15px;color:var(--ink);letter-spacing:1px;min-width:80px;text-align:center}

/* Bottom nav */
.bottom-nav{background:var(--white);border-top:1px solid rgba(0,0,0,.07);display:flex;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0px);height:var(--nav-h);z-index:10}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:transparent;padding:8px 0}
.nav-tab-icon{font-size:20px;line-height:1;transition:transform .15s}
.nav-tab-label{font-size:9px;color:var(--ink-s);letter-spacing:.5px;font-family:var(--ft)}
.nav-tab.active .nav-tab-label{color:var(--sage-d);font-weight:500}
.nav-tab.active .nav-tab-icon{transform:scale(1.1)}
.nav-center{flex:1;display:flex;align-items:center;justify-content:center}
.fab{width:52px;height:52px;border-radius:16px;background:var(--sage);color:#fff;border:none;font-size:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 18px rgba(154,170,148,.55);margin-bottom:6px;transition:transform .15s}
.fab:active{transform:scale(.93)}

/* Cards */
.card{background:var(--white);border-radius:var(--r);padding:16px;margin-bottom:12px;border:1px solid rgba(0,0,0,.04)}
.card-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.card-title{font-size:11px;color:var(--ink-s);letter-spacing:2px;font-family:var(--ft)}
.see-all{font-size:11px;color:var(--sage-d);cursor:pointer}

/* Hero */
.hero{background:linear-gradient(135deg,#c8d3c5,#b5c8bf,#a5b8c8);border-radius:20px;padding:20px 20px 16px;margin-bottom:12px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.1)}
.hero-lbl{font-size:11px;color:rgba(255,255,255,.8);letter-spacing:2px;margin-bottom:5px;font-family:var(--ft)}
.hero-amount{font-family:var(--ft);font-size:34px;color:#fff;font-weight:400;line-height:1}
.hero-cur{font-size:14px;opacity:.85;margin-right:3px}
.prog-wrap{background:rgba(255,255,255,.25);border-radius:4px;height:4px;margin:12px 0 10px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;background:rgba(255,255,255,.85);transition:width .6s}
.hero-row{display:flex}
.hero-stat{flex:1;padding:0 10px;border-left:1px solid rgba(255,255,255,.2)}
.hero-stat:first-child{padding-left:0;border-left:none}
.hero-stat-lbl{font-size:9px;color:rgba(255,255,255,.7);letter-spacing:1px;margin-bottom:2px}
.hero-stat-val{font-size:13px;color:#fff;font-family:var(--ft)}

/* IE strip */
.ie-strip{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.ie-box{border-radius:var(--r);padding:13px;border:1px solid rgba(0,0,0,.04)}
.ie-box.exp{background:var(--white)}
.ie-box.inc{background:var(--income-p);border-color:rgba(127,168,150,.2)}
.ie-lbl{font-size:10px;letter-spacing:1px;margin-bottom:4px;font-family:var(--ft)}
.ie-box.exp .ie-lbl{color:var(--ink-s)}
.ie-box.inc .ie-lbl{color:var(--income-d)}
.ie-val{font-family:var(--ft);font-size:16px}
.ie-box.exp .ie-val{color:var(--blush)}
.ie-box.inc .ie-val{color:var(--income-d)}
.ie-hint{font-size:10px;color:var(--ink-s);margin-top:3px}

/* Stat strip */
.stat-strip{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-box{background:var(--white);border-radius:var(--r);padding:13px;border:1px solid rgba(0,0,0,.04)}
.stat-lbl{font-size:10px;color:var(--ink-s);letter-spacing:1px;margin-bottom:4px;font-family:var(--ft)}
.stat-val{font-family:var(--ft);font-size:17px;color:var(--ink)}
.stat-hint{font-size:10px;color:var(--ink-s);margin-top:3px}

/* Bank group rows (總覽) */
.bank-item{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid rgba(0,0,0,.05);cursor:pointer;transition:opacity .1s}
.bank-item:active{opacity:.7}
.bank-item:last-child{border-bottom:none}
.bank-icon{width:36px;height:36px;border-radius:10px;background:var(--sage-p);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.bank-info{flex:1;margin-left:10px;min-width:0}
.bank-name{font-size:14px;color:var(--ink);font-family:var(--ft)}
.bank-count{font-size:11px;color:var(--ink-s);margin-top:2px}
.bank-amount{font-family:var(--ft);font-size:15px;color:var(--blush)}
.bank-amount.inc{color:var(--income-d)}
.bank-chevron{font-size:14px;color:var(--ink-s);margin-left:8px}

/* Records — 3-level */
.rec-item{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid rgba(0,0,0,.05);cursor:pointer;transition:opacity .1s}
.rec-item:active{opacity:.7}
.rec-item:last-child{border-bottom:none;padding-bottom:0}
.rec-icon{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.rec-info{flex:1;min-width:0}
.rec-store{font-size:14px;color:var(--ink);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--ft)}
.rec-meta{font-size:11px;color:var(--ink-s);margin-top:2px;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.rec-right{text-align:right;flex-shrink:0}
.rec-amount{font-family:var(--ft);font-size:15px}
.rec-amount.exp{color:var(--ink)}
.rec-amount.inc{color:var(--income-d)}
.rec-sign{font-size:12px;margin-right:1px}
.cat-chip{display:inline-block;padding:2px 7px;border-radius:5px;font-size:10px}
.type-badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:9px;font-family:var(--ft)}
.type-badge.exp{background:var(--blush-p);color:var(--blush)}
.type-badge.inc{background:var(--income-p);color:var(--income-d)}

/* Category list (明細第2層) */
.cat-group-item{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid rgba(0,0,0,.05);cursor:pointer;transition:opacity .1s}
.cat-group-item:active{opacity:.7}
.cat-group-item:last-child{border-bottom:none}
.cg-icon{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.cg-info{flex:1;min-width:0}
.cg-name{font-size:14px;color:var(--ink);font-family:var(--ft)}
.cg-count{font-size:11px;color:var(--ink-s);margin-top:2px}
.cg-right{text-align:right;flex-shrink:0}
.cg-amount{font-family:var(--ft);font-size:15px;color:var(--ink)}

/* Breadcrumb / back row */
.back-row{display:flex;align-items:center;gap:6px;padding:0 0 12px;cursor:pointer;font-family:var(--ft);font-size:13px;color:var(--sage-d)}
.back-row span{font-size:16px}

/* Filter tabs */
.filter-tabs{display:flex;gap:6px;margin-bottom:12px}
.ftab{flex:1;padding:8px;border-radius:10px;border:1.5px solid rgba(0,0,0,.1);background:var(--white);font-family:var(--ft);font-size:13px;color:var(--ink-m);cursor:pointer;text-align:center;transition:all .15s}
.ftab.on-all{background:var(--sage-p);border-color:var(--sage);color:var(--sage-d)}
.ftab.on-exp{background:var(--blush-p);border-color:var(--blush);color:var(--blush)}
.ftab.on-inc{background:var(--income-p);border-color:var(--income);color:var(--income-d)}

/* Chart tabs */
.chart-tabs{display:flex;gap:8px;margin-bottom:14px}
.ctab{flex:1;padding:9px;border-radius:10px;border:1.5px solid rgba(0,0,0,.08);background:var(--white);font-family:var(--ft);font-size:13px;color:var(--ink-m);cursor:pointer;text-align:center}
.ctab.on-exp{background:var(--blush-p);border-color:var(--blush);color:var(--blush)}
.ctab.on-inc{background:var(--income-p);border-color:var(--income);color:var(--income-d)}

/* Budget */
.bud-row{padding:11px 0;border-bottom:1px solid rgba(0,0,0,.05)}
.bud-row:last-child{border-bottom:none}
.bud-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bud-emoji{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.bud-name{font-size:13px;color:var(--ink);flex:1;font-family:var(--ft)}
.bud-amounts{display:flex;align-items:baseline;gap:2px;font-family:var(--ft)}
.bud-spent{font-size:13px}
.bud-sep{font-size:11px;color:var(--ink-s);margin:0 1px}
.bud-target{width:54px;border:none;background:transparent;font-size:12px;color:var(--ink-s);outline:none;font-family:var(--ft);text-align:right;border-bottom:1px dashed rgba(0,0,0,.18)}
.bud-bar-wrap{height:6px;background:var(--bg);border-radius:4px;overflow:hidden;margin-bottom:4px}
.bud-bar{height:100%;border-radius:4px;transition:width .5s}
.bud-footer{display:flex;justify-content:space-between;font-size:10px;color:var(--ink-s)}

/* Chart */
.chart-legend{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.cl-row{display:flex;align-items:center;gap:8px}
.cl-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.cl-name{flex:1;font-size:13px;color:var(--ink-m);font-family:var(--ft)}
.cl-pct{font-size:12px;color:var(--ink-s);min-width:28px;text-align:right}
.cl-amt{font-size:12px;color:var(--ink);min-width:68px;text-align:right;font-family:var(--ft)}
.line-wrap{position:relative;height:140px;margin-top:6px}

/* Sheet */
.sheet-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(62,58,54,.45);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s;display:flex;align-items:flex-end;max-width:480px;margin:0 auto}
.sheet-overlay.open{opacity:1;pointer-events:all}
.sheet{width:100%;background:var(--white);border-radius:28px 28px 0 0;padding-bottom:calc(env(safe-area-inset-bottom,0px)+12px);transform:translateY(100%);transition:transform .32s cubic-bezier(.32,.72,0,1);max-height:92dvh;display:flex;flex-direction:column}
.sheet-overlay.open .sheet{transform:translateY(0)}
.sheet-handle{width:40px;height:4px;background:rgba(0,0,0,.12);border-radius:2px;margin:12px auto 0;flex-shrink:0}
.sheet-title{font-family:var(--ft);font-size:18px;color:var(--ink);padding:12px 20px 6px;letter-spacing:1px;flex-shrink:0}
.sheet-scroll{overflow-y:auto;padding:4px 20px 6px;flex:1}
.sheet-scroll::-webkit-scrollbar{display:none}

/* Type toggle */
.type-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.type-btn{padding:10px;border-radius:var(--rs);font-family:var(--ft);font-size:14px;cursor:pointer;border:1.5px solid rgba(0,0,0,.1);background:var(--bg);color:var(--ink-m);transition:all .15s;text-align:center}
.type-btn.ae{background:var(--blush-p);border-color:var(--blush);color:var(--blush)}
.type-btn.ai{background:var(--income-p);border-color:var(--income);color:var(--income-d)}

/* Form */
.f-group{margin-bottom:14px}
.f-label{font-size:10px;color:var(--ink-s);letter-spacing:1.5px;margin-bottom:6px;display:block;font-family:var(--ft)}
.f-input{width:100%;padding:12px 14px;border:1px solid rgba(0,0,0,.1);border-radius:var(--rs);font-family:var(--fb);font-size:15px;color:var(--ink);background:var(--surface);outline:none;-webkit-appearance:none}
.f-input:focus{border-color:var(--sage)}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.f-select{width:100%;padding:12px 14px;border:1px solid rgba(0,0,0,.1);border-radius:var(--rs);font-family:var(--fb);font-size:15px;color:var(--ink);background:var(--surface);outline:none;-webkit-appearance:none;appearance:none}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.cat-pick{padding:9px 4px;text-align:center;border-radius:10px;font-size:10px;cursor:pointer;border:1.5px solid transparent;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:var(--ft);transition:border-color .15s}
.cat-pick .cp-emoji{font-size:19px;line-height:1}
.cat-sec-lbl{font-size:10px;color:var(--ink-s);letter-spacing:2px;margin-bottom:7px;font-family:var(--ft)}
.f-actions{display:flex;gap:10px;padding:10px 20px 4px;flex-shrink:0}
.f-cancel{flex:1;padding:13px;background:var(--bg);border:none;border-radius:var(--rs);font-family:var(--ft);font-size:14px;color:var(--ink-m);cursor:pointer}
.f-save{flex:2;padding:13px;background:var(--sage);border:none;border-radius:var(--rs);font-family:var(--ft);font-size:14px;color:#fff;cursor:pointer;letter-spacing:1px}
.f-save:disabled{opacity:.5}

/* Detail */
.detail-header{text-align:center;padding:12px 0 18px}
.detail-icon{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 10px}
.detail-amount{font-family:var(--ft);font-size:28px}
.detail-field{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid rgba(0,0,0,.05)}
.detail-field:last-of-type{border-bottom:none}
.df-label{font-size:12px;color:var(--ink-s);font-family:var(--ft)}
.df-val{font-size:13px;color:var(--ink);text-align:right;max-width:65%;word-break:break-all;font-family:var(--ft)}
.btn-edit{flex:1;padding:12px;background:var(--sage-p);border:1.5px solid var(--sage-l);border-radius:var(--rs);font-family:var(--ft);font-size:13px;color:var(--sage-d);cursor:pointer}
.btn-del{flex:1;padding:12px;background:var(--blush);border:1.5px solid var(--blush-l);border-radius:var(--rs);font-family:var(--ft);font-size:13px;color:#fff;cursor:pointer}

/* Confirm */
.confirm-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(62,58,54,.45);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;max-width:480px;margin:0 auto}
.confirm-overlay.open{opacity:1;pointer-events:all}
.confirm-box{background:var(--white);border-radius:22px;padding:26px 22px;width:290px;text-align:center}
.confirm-box h3{font-family:var(--ft);font-size:16px;color:var(--ink);margin-bottom:8px}
.confirm-box p{font-size:12px;color:var(--ink-s);margin-bottom:20px;line-height:1.8}
.confirm-acts{display:flex;gap:10px}
.cb-cancel{flex:1;padding:12px;background:var(--bg);border:none;border-radius:var(--rs);font-family:var(--ft);font-size:13px;color:var(--ink-m);cursor:pointer}
.cb-del{flex:1;padding:12px;background:var(--blush);border:none;border-radius:var(--rs);font-family:var(--ft);font-size:13px;color:#fff;cursor:pointer}

.toast{position:fixed;bottom:calc(var(--nav-h)+10px);left:50%;transform:translateX(-50%) translateY(8px);background:rgba(62,58,54,.92);color:#fff;padding:9px 18px;border-radius:20px;font-size:12px;letter-spacing:1px;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;z-index:300;font-family:var(--ft)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty-state{text-align:center;padding:36px 20px;color:var(--ink-s);font-size:13px;letter-spacing:1px;line-height:2;font-family:var(--ft)}
</style>
</head>
<body>
<div class="app">
  <!-- HOME -->
  <div class="screen active" id="sc-home">
    <div class="topbar"><div class="month-nav">
      <button class="mnav-btn" onclick="chMonth(-1)">‹</button>
      <div class="mnav-lbl" id="home-month"></div>
      <button class="mnav-btn" onclick="chMonth(1)">›</button>
    </div></div>
    <div class="scroll" id="home-scroll"><div class="empty-state">載入中⋯</div></div>
  </div>

  <!-- RECORDS -->
  <div class="screen" id="sc-records">
    <div class="topbar"><div class="month-nav">
      <button class="mnav-btn" onclick="chMonth(-1)">‹</button>
      <div class="mnav-lbl" id="rec-month"></div>
      <button class="mnav-btn" onclick="chMonth(1)">›</button>
    </div></div>
    <div class="scroll" id="rec-scroll"></div>
  </div>

  <!-- CHART -->
  <div class="screen" id="sc-chart">
    <div class="topbar"><div class="month-nav">
      <button class="mnav-btn" onclick="chMonth(-1)">‹</button>
      <div class="mnav-lbl" id="chart-month"></div>
      <button class="mnav-btn" onclick="chMonth(1)">›</button>
    </div></div>
    <div class="scroll" id="chart-scroll"></div>
  </div>

  <!-- BUDGET -->
  <div class="screen" id="sc-budget">
    <div class="topbar"><div class="mnav-lbl" style="font-family:var(--ft);font-size:15px;color:var(--ink)">預算設定</div></div>
    <div class="scroll" id="budget-scroll"></div>
  </div>

  <div class="bottom-nav">
    <button class="nav-tab active" id="nav-home" onclick="goScreen('home')"><div class="nav-tab-icon">⌂</div><div class="nav-tab-label">總覽</div></button>
    <button class="nav-tab" id="nav-records" onclick="goScreen('records')"><div class="nav-tab-icon">☰</div><div class="nav-tab-label">明細</div></button>
    <div class="nav-center"><button class="fab" onclick="openAdd()">＋</button></div>
    <button class="nav-tab" id="nav-chart" onclick="goScreen('chart')"><div class="nav-tab-icon">◎</div><div class="nav-tab-label">圖表</div></button>
    <button class="nav-tab" id="nav-budget" onclick="goScreen('budget')"><div class="nav-tab-icon">◇</div><div class="nav-tab-label">預算</div></button>
  </div>
</div>

<!-- Add/Edit Sheet -->
<div class="sheet-overlay" id="add-overlay" onclick="overlayTap(event,'add-overlay')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="add-title">新增一筆</div>
    <div class="sheet-scroll">
      <input type="hidden" id="edit-id">
      <div class="type-toggle">
        <button id="btn-exp" class="type-btn ae" onclick="setType('expense')">－ 支出</button>
        <button id="btn-inc" class="type-btn" onclick="setType('income')">＋ 收入</button>
      </div>
      <div class="f-row">
        <!-- 金額：inputmode=decimal，讓 iOS 鍵盤顯示數字+小數點，部分鍵盤支援計算 -->
        <div class="f-group">
          <label class="f-label">金額</label>
          <input class="f-input" id="f-amount" type="text" inputmode="decimal" placeholder="0">
        </div>
        <div class="f-group">
          <label class="f-label">點數</label>
          <input class="f-input" id="f-points" type="text" inputmode="decimal" placeholder="0">
        </div>
      </div>

const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV0bGJremlraHF0Z3luc2p5eWx1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMjQ3NzUsImV4cCI6MjA5MDgwMDc3NX0.oLKJ5bMYdtVoOIRo5qzi0JJVaD-Tte4Hdb5ZojR895c';
const H={apikey:KEY,Authorization:`Bearer ${KEY}`,'Content-Type':'application/json'};

const EXP_CATS={

let exps=[],budgets=JSON.parse(localStorage.getItem('mb6_bud')||'{"cats":{}}');
let cy=new Date().getFullYear(),cm=new Date().getMonth()+1;
let curScr='home',selCat='飲食',selType='expense',chartInst={};

// 明細頁狀態
let recLevel=0; // 0=type選擇, 1=分類列表, 2=明細列表

// 圖表頁狀態
let chartTab='expense';

const fmt=n=>Math.round(n).toLocaleString();
const fdate=s=>s?s.slice(0,10):'';
const isInc=e=>(e.type||'expense')==='income';
const catInfo=e=>{const t=e.type||'expense',c=e.category||'其他';return(t==='income'?INC_CATS[c]:EXP_CATS[c])||(t==='income'?INC_CATS['其他收入']:EXP_CATS['其他'])};

function mlbl(){return`${cy}/${String(cm).padStart(2,'0')}`}
function updMonths(){['home','rec','chart'].forEach(k=>{const el=document.getElementById(k+'-month');if(el)el.textContent=mlbl()})}
function chMonth(d){cm+=d;if(cm>12){cm=1;cy++}if(cm<1){cm=12;cy--}updMonths();loadData()}
updMonths();

function goScreen(s){
  curScr=s;
  document.querySelectorAll('.screen').forEach(el=>el.classList.remove('active'));
  document.getElementById('sc-'+s).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  const nb=document.getElementById('nav-'+s);if(nb)nb.classList.add('active');
  // reset sub-states
  if(s==='records'){recLevel=0;recType='all';recCat=null;}
  render(s);
}

async function loadData(){
  const start=`${cy}-${String(cm).padStart(2,'0')}-01`;
  const end=cm===12?`${cy+1}-01-01`:`${cy}-${String(cm+1).padStart(2,'0')}-01`;
  try{
    const r=await fetch(`${SB}/rest/v1/expenses?select=*&created_at=gte.${start}&created_at=lt.${end}&order=created_at.desc`,{headers:H});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const j=await r.json();exps=Array.isArray(j)?j:[];
  }catch(err){showToast('載入失敗: '+err.message);exps=[]}
  render(curScr);
}

function stats(){
  const income=exps.filter(e=>isInc(e)).reduce((s,e)=>s+parseFloat(e.amount||0),0);
  const expense=exps.filter(e=>!isInc(e)).reduce((s,e)=>s+parseFloat(e.amount||0),0);
  const bycat={};exps.filter(e=>!isInc(e)).forEach(e=>{const c=e.category||'其他';bycat[c]=(bycat[c]||0)+parseFloat(e.amount||0)});
  const byIncCat={};exps.filter(e=>isInc(e)).forEach(e=>{const c=e.category||'其他收入';byIncCat[c]=(byIncCat[c]||0)+parseFloat(e.amount||0)});
  return{income,expense,net:income-expense,bycat,byIncCat,count:exps.length};
}

function render(s){
  if(s==='home')renderHome();
  else if(s==='records')renderRecords();
  else if(s==='chart')renderChart();
  else if(s==='budget')renderBudget();
}

/* ─── HOME ─── */

  const{income,expense,net,bycat}=stats();
  const bud=Object.values(budgets.cats||{}).reduce((s,v)=>s+(parseFloat(v)||0),0);
  const pct=bud>0?Math.min(100,Math.round(expense/bud*100)):0;
  const avg=expense/new Date(cy,cm,0).getDate();
  const top=Object.entries(bycat).sort((a,b)=>b[1]-a[1])[0];

  // 依 source 分組顯示（支出+收入分開）
  const bankGroups={};
  exps.forEach(e=>{
    const k=e.source||'其他';
    if(!bankGroups[k])bankGroups[k]={exp:0,inc:0,count:0};
    if(isInc(e))bankGroups[k].inc+=parseFloat(e.amount||0);
    else bankGroups[k].exp+=parseFloat(e.amount||0);
    bankGroups[k].count++;
  });
  const bankItems=Object.entries(bankGroups).sort((a,b)=>(b[1].exp+b[1].inc)-(a[1].exp+a[1].inc)).map(([name,g])=>{
    const emoji=BANK_EMOJI[name]||'💳';
    const net=g.inc-g.exp;
    return`<div class="bank-item" onclick="openBankDetail('${name}')">
      <div class="bank-icon">${emoji}</div>
      <div class="bank-info">
        <div class="bank-name">${name}</div>
        <div class="bank-count">${g.count} 筆 ${g.inc>0?'・收入 NT$'+fmt(g.inc):''}${g.exp>0?'・支出 NT$'+fmt(g.exp):''}</div>
      </div>
      <div style="text-align:right">
        <div class="bank-amount ${net>=0?'inc':'exp'}">${net>=0?'＋':'－'}NT$${fmt(Math.abs(net))}</div>
      </div>
      <div class="bank-chevron">›</div>
    </div>`;
  }).join('')||'<div class="empty-state">這個月還沒有記錄 ✦</div>';

  document.getElementById('home-scroll').innerHTML=`
    <div class="hero">
      <div class="hero-lbl">本月結餘</div>
      <div class="hero-amount"><span class="hero-cur">NT$</span>${fmt(net)}</div>
      <div class="prog-wrap"><div class="prog-fill" style="width:${pct}%"></div></div>
      <div class="hero-row">
        <div class="hero-stat"><div class="hero-stat-lbl">支出</div><div class="hero-stat-val">NT$${fmt(expense)}</div></div>
        <div class="hero-stat"><div class="hero-stat-lbl">收入</div><div class="hero-stat-val">NT$${fmt(income)}</div></div>
        <div class="hero-stat"><div class="hero-stat-lbl">筆數</div><div class="hero-stat-val">${exps.length} 筆</div></div>
      </div>
    </div>
    <div class="ie-strip">
      <div class="ie-box exp"><div class="ie-lbl">本月支出</div><div class="ie-val">NT$${fmt(expense)}</div><div class="ie-hint">預算 ${pct}%</div></div>
      <div class="ie-box inc"><div class="ie-lbl">本月收入</div><div class="ie-val">NT$${fmt(income)}</div><div class="ie-hint">結餘 NT$${fmt(net)}</div></div>
    </div>
    <div class="stat-strip">
      <div class="stat-box"><div class="stat-lbl">支出日均</div><div class="stat-val">NT$${fmt(avg)}</div><div class="stat-hint">每日平均</div></div>
      <div class="stat-box"><div class="stat-lbl">最大支出</div><div class="stat-val" style="font-size:14px">${top?top[0]:'—'}</div><div class="stat-hint">${top?'NT$'+fmt(top[1]):'尚無資料'}</div></div>
    </div>
    <div class="card">
      <div class="card-row"><span class="card-title">依銀行 / 來源</span><span class="see-all" onclick="goScreen('records')">查看明細 →</span></div>
      ${bankItems}
    </div>`;
}

// 從總覽點進特定銀行的明細
function openBankDetail(bankName){
  goScreen('records');
  recLevel=2;recType='all';recCat=null;
  renderRecords(null,null,bankName);
}

/* ─── RECORDS (3層) ─── */
function recHTML(e){
  const cii=catInfo(e),inc=isInc(e);
  return`<div class="rec-item" onclick="openDetail('${e.id}')">
    <div class="rec-icon" style="background:${cii.bg}">${cii.e}</div>
    <div class="rec-info">
      <div class="rec-store">${e.store&&e.store!=='未知'?e.store:'—'}</div>
      <div class="rec-meta">
        <span>${fdate(e.created_at)}</span>
        <span class="cat-chip" style="background:${cii.bg};color:${cii.tx}">${e.category||'其他'}</span>
        ${e.source?`<span style="color:var(--ink-s)">${e.source}</span>`:''}
      </div>
    </div>
    <div class="rec-right">
      <div class="rec-amount ${inc?'inc':'exp'}"><span class="rec-sign">${inc?'＋':'－'}</span>NT$${fmt(e.amount)}</div>
      ${(e.points||0)>0?`<div style="font-size:10px;color:var(--ink-s)">點數 ${e.points}</div>`:''}
    </div>
  </div>`;
}

function renderRecords(typeOverride, catOverride, bankFilter){
  if(typeOverride!==null&&typeOverride!==undefined){recType=typeOverride;recLevel=typeOverride==='all'?0:1;recCat=null;}
  if(catOverride!==null&&catOverride!==undefined){recCat=catOverride;recLevel=2;}

  const el=document.getElementById('rec-scroll');

  if(bankFilter){
    // 從總覽導過來的銀行篩選
    const fil=exps.filter(e=>(e.source||'其他')===bankFilter);
    const bankEmoji=BANK_EMOJI[bankFilter]||'💳';
    el.innerHTML=`
      <div class="back-row" onclick="goScreen('records')"><span>‹</span> 返回明細</div>
      <div class="card" style="margin-bottom:0">
        <div class="card-row">
          <span class="card-title">${bankEmoji} ${bankFilter}</span>
          <span style="font-size:11px;color:var(--ink-s)">${fil.length} 筆</span>
        </div>
        ${fil.map(recHTML).join('')||'<div class="empty-state">尚無記錄</div>'}
      </div>`;
    return;
  }

  // Level 0：支出 / 收入 / 全部 tab
  if(recLevel===0){
    const expTotal=exps.filter(e=>!isInc(e)).reduce((s,e)=>s+parseFloat(e.amount||0),0);
    const incTotal=exps.filter(e=>isInc(e)).reduce((s,e)=>s+parseFloat(e.amount||0),0);
    el.innerHTML=`
      <div class="filter-tabs">
        <div class="ftab on-all" onclick="renderRecords('all')">全部<div style="font-size:10px;margin-top:2px;opacity:.7">${exps.length} 筆</div></div>
        <div class="ftab" onclick="renderRecords('expense')">支出<div style="font-size:10px;margin-top:2px;opacity:.7">NT$${fmt(expTotal)}</div></div>
        <div class="ftab" onclick="renderRecords('income')">收入<div style="font-size:10px;margin-top:2px;opacity:.7">NT$${fmt(incTotal)}</div></div>
      </div>
      <div class="card" style="margin-bottom:0">
        ${exps.slice(0,8).map(recHTML).join('')||'<div class="empty-state">這個月沒有記錄 ✦</div>'}
        ${exps.length>8?`<div style="text-align:center;padding:10px 0 0;font-size:12px;color:var(--sage-d);cursor:pointer;font-family:var(--ft)" onclick="renderRecords('all')">查看全部 ${exps.length} 筆 →</div>`:''}
      </div>`;
    return;
  }

  // Level 1：分類列表
  if(recLevel===1){
    const filtered=recType==='all'?exps:exps.filter(e=>(e.type||'expense')===recType);
    const isExpView=recType==='expense';
    const cats=isExpView?EXP_CATS:INC_CATS;
    const bycat={};
    filtered.forEach(e=>{const c=e.category||'其他';bycat[c]=(bycat[c]||0)+parseFloat(e.amount||0);});
    const catCount={};filtered.forEach(e=>{const c=e.category||'其他';catCount[c]=(catCount[c]||0)+1;});

    const catRows=Object.entries(cats)
      .filter(([name])=>bycat[name]>0||(catCount[name]||0)>0)
      .sort((a,b)=>(bycat[b[0]]||0)-(bycat[a[0]]||0))
      .map(([name,ci])=>{
        const amt=bycat[name]||0;const cnt=catCount[name]||0;
        return`<div class="cat-group-item" onclick="renderRecords(null,'${name}')">
          <div class="cg-icon" style="background:${ci.bg}">${ci.e}</div>
          <div class="cg-info">
            <div class="cg-name">${name}</div>
            <div class="cg-count">${cnt} 筆</div>
          </div>
          <div class="cg-right">
            <div class="cg-amount" style="color:${isExpView?'var(--blush)':'var(--income-d)'}">${isExpView?'－':'＋'}NT$${fmt(amt)}</div>
          </div>
          <div class="bank-chevron">›</div>
        </div>`;
      }).join('')||'<div class="empty-state">尚無記錄 ✦</div>';

    const typeLabel=recType==='expense'?'支出':recType==='income'?'收入':'全部';
    el.innerHTML=`
      <div class="back-row" onclick="renderRecords('all',null)"><span>‹</span> 返回</div>
      <div class="filter-tabs">
        <div class="ftab${recType==='all'?' on-all':''}" onclick="renderRecords('all')">全部</div>
        <div class="ftab${recType==='expense'?' on-exp':''}" onclick="renderRecords('expense')">支出</div>
        <div class="ftab${recType==='income'?' on-inc':''}" onclick="renderRecords('income')">收入</div>
      </div>
      <div class="card" style="margin-bottom:0">
        <div class="card-row"><span class="card-title">${typeLabel} — 分類</span></div>
        ${catRows}
      </div>`;
    return;
  }

  // Level 2：明細列表
  if(recLevel===2){
    const filtered=exps.filter(e=>{
      const typeOk=recType==='all'||(e.type||'expense')===recType;
      const catOk=!recCat||(e.category||'其他')===recCat;
      return typeOk&&catOk;
    });
    const cii=recCat?(catInfo({type:recType==='income'?'income':'expense',category:recCat})):null;
    el.innerHTML=`
      <div class="back-row" onclick="recLevel=1;renderRecords()"><span>‹</span> 返回分類</div>
      <div class="card" style="margin-bottom:0">
        <div class="card-row">
          <span class="card-title">${cii?cii.e+' ':''} ${recCat||'全部'}</span>
          <span style="font-size:11px;color:var(--ink-s)">${filtered.length} 筆</span>
        </div>
        ${filtered.map(recHTML).join('')||'<div class="empty-state">沒有符合的記錄 ✦</div>'}
      </div>`;
  }
}

/* ─── CHART ─── */
function renderChart(){
  const{expense,income,bycat,byIncCat}=stats();
  const isExp=chartTab==='expense';
  const total=isExp?expense:income;
  const byCatData=isExp?bycat:byIncCat;
  const cats=isExp?EXP_CATS:INC_CATS;

  const daily={};
  exps.filter(e=>isInc(e)!==isExp).forEach(e=>{const d=e.created_at.slice(0,10);daily[d]=(daily[d]||0)+parseFloat(e.amount||0)});
  const days=Object.keys(daily).sort();
  const ckeys=Object.keys(byCatData).sort((a,b)=>byCatData[b]-byCatData[a]);
  const legend=ckeys.map(k=>{const c=cats[k]||(isExp?EXP_CATS['其他']:INC_CATS['其他收入']),p=total>0?Math.round(byCatData[k]/total*100):0;
    return`<div class="cl-row"><div class="cl-dot" style="background:${c.c}"></div><div class="cl-name">${c.e} ${k}</div><div class="cl-pct">${p}%</div><div class="cl-amt">NT$${fmt(byCatData[k])}</div></div>`;
  }).join('');

  const lineColor=isExp?'#c4a090':'#7fa896';
  const lineAlpha=isExp?'rgba(196,160,144,.12)':'rgba(127,168,150,.12)';

  document.getElementById('chart-scroll').innerHTML=`
    <div class="chart-tabs">
      <div class="ctab${chartTab==='expense'?' on-exp':''}" onclick="chartTab='expense';renderChart()">支出圖表</div>
      <div class="ctab${chartTab==='income'?' on-inc':''}" onclick="chartTab='income';renderChart()">收入圖表</div>
    </div>
    <div class="card">
      <div class="card-row"><span class="card-title">${isExp?'支出':'收入'}分類佔比</span><span style="font-size:11px;color:var(--ink-s)">NT$${fmt(total)}</span></div>
      <div style="position:relative;height:180px;width:180px;margin:0 auto"><canvas id="dc"></canvas></div>
      <div class="chart-legend">${legend||'<div class="empty-state">尚無資料</div>'}</div>
    </div>
    <div class="card">
      <div class="card-row"><span class="card-title">每日${isExp?'支出':'收入'}趨勢</span></div>
      <div class="line-wrap"><canvas id="lc"></canvas></div>
    </div>`;

  setTimeout(()=>{
    if(chartInst.d)chartInst.d.destroy();
    if(chartInst.l)chartInst.l.destroy();
    if(ckeys.length){
      chartInst.d=new Chart(document.getElementById('dc'),{
        type:'doughnut',
        data:{labels:ckeys,datasets:[{data:ckeys.map(k=>Math.round(byCatData[k])),backgroundColor:ckeys.map(k=>(cats[k]||(isExp?EXP_CATS['其他']:INC_CATS['其他收入'])).c),borderWidth:3,borderColor:'#fff'}]},
        options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{display:false}}}
      });
    }
    if(days.length){
      chartInst.l=new Chart(document.getElementById('lc'),{
        type:'line',
        data:{labels:days.map(d=>d.slice(5)),datasets:[{data:days.map(d=>Math.round(daily[d])),borderColor:lineColor,backgroundColor:lineAlpha,borderWidth:2,pointBackgroundColor:lineColor,pointRadius:3,tension:.4,fill:true}]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(0,0,0,.04)'},ticks:{font:{size:10},color:'#a8a09a',maxRotation:0,autoSkip:true,maxTicksLimit:7}},y:{grid:{color:'rgba(0,0,0,.04)'},ticks:{font:{size:10},color:'#a8a09a',callback:v=>'$'+v.toLocaleString()}}}}
      });
    }
  },80);
}

/* ─── BUDGET ─── */
function renderBudget(){
  const expExps=exps.filter(e=>!isInc(e));
  const bycat={};expExps.forEach(e=>{const c=e.category||'其他';bycat[c]=(bycat[c]||0)+parseFloat(e.amount||0)});
  const totalBud=Object.values(budgets.cats||{}).reduce((s,v)=>s+(parseFloat(v)||0),0);
  const totalSpent=expExps.reduce((s,e)=>s+parseFloat(e.amount||0),0);
  const pct=totalBud>0?Math.min(100,Math.round(totalSpent/totalBud*100)):0;
  const rows=Object.entries(EXP_CATS).map(([name,cii])=>{
    const spent=bycat[name]||0,catBud=parseFloat(budgets.cats?.[name])||0;
    const p=catBud>0?Math.min(100,Math.round(spent/catBud*100)):0,over=catBud>0&&spent>catBud;
    return`<div class="bud-row">
      <div class="bud-top">
        <div class="bud-emoji">${cii.e}</div>
        <div class="bud-name">${name}</div>
        <div class="bud-amounts">
          <span class="bud-spent" style="color:${over?'#c4a090':'var(--ink)'}">${fmt(spent)}</span>
          <span class="bud-sep">/</span>
          <input type="number" class="bud-target" value="${catBud||''}" placeholder="預算" onchange="setCatBud('${name}',this.value)" inputmode="numeric">
        </div>
      </div>
      <div class="bud-bar-wrap"><div class="bud-bar" style="width:${p}%;background:${over?'#c4a090':cii.c}"></div></div>
      <div class="bud-footer">
        <span>${catBud>0?p+'% 已用':'點右側設定'}</span>
        <span style="color:${over?'#c4a090':'var(--ink-s)'}">${catBud>0?(over?'超支 NT$'+fmt(spent-catBud):'剩 NT$'+fmt(catBud-spent)):'未設定'}</span>
      </div>
    </div>`;
  }).join('');
  document.getElementById('budget-scroll').innerHTML=`
    <div class="card">
      <div class="card-row"><span class="card-title">每月支出總預算</span><span style="font-size:10px;color:var(--ink-s)">= 各分類加總</span></div>
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px">
        <div style="font-family:var(--ft);font-size:24px;color:var(--ink)">NT$ ${fmt(totalBud)}</div>
        <div style="font-size:12px;color:var(--ink-s)">已花 ${pct}%</div>
      </div>
      <div style="background:var(--bg);border-radius:5px;height:8px;overflow:hidden;margin-bottom:8px">
        <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--sage),var(--blush));border-radius:5px;transition:width .5s"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--ink-s)">
        <span>已花 NT$ ${fmt(totalSpent)}</span><span>剩 NT$ ${fmt(totalBud-totalSpent)}</span>
      </div>
    </div>
    <div class="card">
      <div class="card-row"><span class="card-title">分類預算</span><span style="font-size:10px;color:var(--ink-s)">右側輸入預算</span></div>
      ${rows}
    </div>`;
}

function setCatBud(c,v){
  if(!budgets.cats)budgets.cats={};
  budgets.cats[c]=parseFloat(v)||0;
  localStorage.setItem('mb6_bud',JSON.stringify(budgets));
  renderBudget();
}

/* ─── Type & Cat ─── */
function setType(t){
  selType=t;
  document.getElementById('btn-exp').className='type-btn'+(t==='expense'?' ae':'');
  document.getElementById('btn-inc').className='type-btn'+(t==='income'?' ai':'');
  document.getElementById('cat-lbl').textContent=t==='income'?'收入分類':'支出分類';
  selCat=t==='income'?'薪水':'飲食';
  buildCatGrid();
}
function buildCatGrid(){
  const cats=selType==='income'?INC_CATS:EXP_CATS;
  document.getElementById('cat-grid').innerHTML=Object.entries(cats).map(([n,ci])=>
    `<div class="cat-pick" data-cat="${n}" style="background:${ci.bg};color:${ci.tx}" onclick="pickCat('${n}')">
      <div class="cp-emoji">${ci.e}</div><div>${n}</div>
    </div>`).join('');
  pickCat(selCat);
}
function pickCat(n){
  selCat=n;
  document.querySelectorAll('.cat-pick').forEach(el=>{
    const cats=selType==='income'?INC_CATS:EXP_CATS;
    const c=cats[el.dataset.cat];if(!c)return;
    el.style.borderColor=el.dataset.cat===n?c.c:'transparent';
  });
}
buildCatGrid();

/* ─── Add/Edit ─── */
function openAdd(){
  document.getElementById('add-title').textContent='新增一筆';
  document.getElementById('edit-id').value='';
  document.getElementById('f-amount').value='';
  document.getElementById('f-points').value='';
  document.getElementById('f-store').value='';
  document.getElementById('f-note').value='';
  document.getElementById('f-payment').value='';
  document.getElementById('f-source').value='';
  document.getElementById('f-date').value=new Date().toISOString().slice(0,10);
  document.getElementById('save-btn').textContent='記帳';
  setType('expense');
  document.getElementById('add-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('f-amount').focus(),350);
}
function closeAdd(){document.getElementById('add-overlay').classList.remove('open')}

function openEdit(id){
  const e=exps.find(x=>x.id===id);if(!e)return;
  closeDetail();
  document.getElementById('add-title').textContent='編輯這筆';
  document.getElementById('edit-id').value=e.id;
  document.getElementById('f-amount').value=e.amount;
  document.getElementById('f-points').value=e.points||'';
  document.getElementById('f-store').value=e.store&&e.store!=='未知'?e.store:'';
  document.getElementById('f-note').value=e.note||'';
  document.getElementById('f-payment').value=e.payment_method||'';
  document.getElementById('f-source').value=e.source||'';
  document.getElementById('f-date').value=e.created_at.slice(0,10);
  document.getElementById('save-btn').textContent='儲存';
  const t=e.type||'expense';setType(t);
  selCat=e.category||(t==='income'?'薪水':'飲食');
  buildCatGrid();
  document.getElementById('add-overlay').classList.add('open');
}

async function saveExpense(){
  const amountRaw=document.getElementById('f-amount').value.trim();
  const pointsRaw=document.getElementById('f-points').value.trim();

  // 修正：允許金額為 0（只要有點數 > 0 也算有效）
  const amount=amountRaw===''?null:parseFloat(amountRaw);
  const points=pointsRaw===''?0:(parseInt(pointsRaw)||0);

  if((amount===null||isNaN(amount)||amount<0)&&points<=0){
    showToast('請輸入金額或點數');return;
  }

  const store=document.getElementById('f-store').value.trim()||'手動輸入';
  const note=document.getElementById('f-note').value.trim()||null;
  const payment_method=document.getElementById('f-payment').value||null;
  const source=document.getElementById('f-source').value||null;
  const dateVal=document.getElementById('f-date').value;
  const created_at=dateVal?new Date(dateVal+'T12:00:00+08:00').toISOString():new Date().toISOString();
  const eid=document.getElementById('edit-id').value;
  const btn=document.getElementById('save-btn');
  btn.disabled=true;btn.textContent='儲存中…';

  try{
    const body=JSON.stringify({
      amount: amount===null?0:amount,  // 純點數交易金額存 0
      points,store,category:selCat,type:selType,
      payment_method,source,created_at,note,original_text:'手動新增'
    });
    const url=eid?`${SB}/rest/v1/expenses?id=eq.${eid}`:`${SB}/rest/v1/expenses`;
    const r=await fetch(url,{method:eid?'PATCH':'POST',headers:{...H,Prefer:'return=minimal'},body});
    if(!r.ok)throw new Error('HTTP '+r.status);
    closeAdd();
    showToast(eid?'已更新 ✓':(selType==='income'?'收入記錄 ✓':'記帳成功 ✓'));
    await loadData();
  }catch(err){showToast('儲存失敗: '+err.message)}
  finally{btn.disabled=false;btn.textContent=document.getElementById('edit-id').value?'儲存':'記帳'}
}

/* ─── Detail ─── */
function openDetail(id){
  const e=exps.find(x=>x.id===id);if(!e)return;
  const cii=catInfo(e),inc=isInc(e);
  document.getElementById('detail-body').innerHTML=`
    <div class="detail-header">
      <div class="detail-icon" style="background:${cii.bg}">${cii.e}</div>
      <div class="detail-amount" style="color:${inc?'var(--income-d)':'var(--ink)'}">
        ${inc?'＋':'－'} NT$ ${fmt(e.amount)}
      </div>
    </div>
    <div class="detail-field"><span class="df-label">類型</span><span class="df-val"><span class="type-badge ${inc?'inc':'exp'}">${inc?'收入':'支出'}</span></span></div>
    <div class="detail-field"><span class="df-label">店家</span><span class="df-val">${e.store&&e.store!=='未知'?e.store:'—'}</span></div>
    <div class="detail-field"><span class="df-label">分類</span><span class="df-val"><span class="cat-chip" style="background:${cii.bg};color:${cii.tx}">${e.category||'其他'}</span></span></div>
    <div class="detail-field"><span class="df-label">日期</span><span class="df-val">${fdate(e.created_at)}</span></div>
    ${e.payment_method?`<div class="detail-field"><span class="df-label">付款方式</span><span class="df-val">${e.payment_method}</span></div>`:''}
    ${e.source?`<div class="detail-field"><span class="df-label">銀行 / 來源</span><span class="df-val">${e.source}</span></div>`:''}
    ${(e.points||0)>0?`<div class="detail-field"><span class="df-label">點數</span><span class="df-val">${e.points}</span></div>`:''}
    ${e.note?`<div class="detail-field"><span class="df-label">備註</span><span class="df-val">${e.note}</span></div>`:''}`;
  document.getElementById('detail-acts').innerHTML=`
    <button class="btn-edit" onclick="openEdit('${e.id}')">✎ 編輯</button>
    <button class="btn-del" onclick="askDelete('${e.id}')">刪除</button>`;
  document.getElementById('detail-overlay').classList.add('open');
}
function closeDetail(){document.getElementById('detail-overlay').classList.remove('open')}

function askDelete(id){
  closeDetail();
  document.getElementById('confirm-del-btn').onclick=()=>doDelete(id);
  document.getElementById('confirm-overlay').classList.add('open');
}
function closeConfirm(){document.getElementById('confirm-overlay').classList.remove('open')}
async function doDelete(id){
  try{
    const r=await fetch(`${SB}/rest/v1/expenses?id=eq.${id}`,{method:'DELETE',headers:H});
    if(!r.ok)throw new Error();
    closeConfirm();showToast('已刪除');await loadData();
  }catch{showToast('刪除失敗')}
}

function overlayTap(ev,id){if(ev.target.id===id)document.getElementById(id).classList.remove('open')}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}

loadData();
</script>
</body>
</html>
